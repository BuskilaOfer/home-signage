<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Tower Signage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background: building image via CSS background-image on .bg-wrap (works with --disable-gpu) -->
    <div class="bg-wrap">
        <div class="bg-overlay"></div>
    </div>

    <div class="main-area">
        <div class="youtube-panel">
            <div class="youtube-card">
                <!-- YouTube video rendered by mpv (hardware decode) via Wayland overlay -->
                <div id="yt-player" style="width:100%;height:100%;background:#000;"></div>
            </div>
        </div>

        <div class="right-panel">
            <div id="clock-widget" class="widget clock-widget">
                <div id="clock-time" class="clock-time">00:00:00</div>
                <div id="clock-date" class="clock-date">1 June 2026</div>
            </div>
            <div class="widget weather-widget">
                <div class="weather-row-top">
                    <div class="weather-location">
                        <div id="weather-city" class="weather-city">Kiryat Motzkin</div>
                        <div id="weather-day"  class="weather-day">Tuesday</div>
                    </div>
                    <div class="weather-temp-group">
                        <span id="weather-temp" class="weather-temp">27&#176;C</span>
                        <div class="weather-hl">
                            <span>&#8593;&nbsp;<span id="weather-high">29</span>&#176;C</span>
                            <span>&#8595;&nbsp;<span id="weather-low">23</span>&#176;C</span>
                        </div>
                    </div>
                </div>
                <div class="weather-center">
                    <div id="weather-main-icon" class="weather-main-icon"></div>
                    <div id="weather-desc" class="weather-desc">Sunny</div>
                </div>
                <div class="weather-forecast" id="weather-forecast"></div>
            </div>
        </div>
    </div>

    <!-- RSS Bar -->
    <div class="rss-bar">
        <div class="rss-text-panel">
            <div class="rss-meta-row">
                <svg class="rss-svg-icon" viewBox="0 0 24 24">
                    <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1Z"/>
                </svg>
                <span id="rss-time-ago" class="rss-time-ago">&#x05DC;&#x05E4;&#x05E0;&#x05D9; 5 &#x05D3;&#x05E7;&#x05D5;&#x05EA;</span>
            </div>
            <div id="rss-headline"    class="rss-headline"    dir="rtl">&#x05D8;&#x05D5;&#x05E2;&#x05DF; &#x05D7;&#x05D3;&#x05E9;&#x05D5;&#x05EA;...</div>
            <div id="rss-description" class="rss-description" dir="rtl"></div>
        </div>

        <div class="rss-image-panel">
            <img id="rss-article-img" src="" alt="" class="rss-article-img">
        </div>

        <div class="building-logo-panel">
            <img id="building-logo" src="assets/logo.svg" alt="Urban Tower">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
